<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BABA FOOD — Benvenuto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0A0A0A;
      color: #FFFFFF;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
      overflow-x: hidden;
    }

    /* ── Animations ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(204, 0, 0, 0.4); }
      50%       { box-shadow: 0 0 0 12px rgba(204, 0, 0, 0); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 48px 24px 40px;
      animation: fadeIn 0.6s ease both;
    }

    /* ── Logo ── */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      animation: fadeInUp 0.7s ease 0.1s both;
    }

    .logo-svg-wrap {
      position: relative;
      width: 110px;
      height: 110px;
    }

    .logo-glow {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(204,0,0,0.25) 0%, transparent 70%);
      animation: pulse 2.5s ease-in-out infinite;
    }

    .logo-wordmark {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 4px;
      color: #CC0000;
      text-transform: uppercase;
      animation: fadeInUp 0.7s ease 0.2s both;
    }

    /* ── Hero text ── */
    .hero {
      margin-top: 36px;
      text-align: center;
      animation: fadeInUp 0.7s ease 0.3s both;
    }

    .hero h1 {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.5px;
    }

    .hero h1 span {
      color: #CC0000;
    }

    .hero p {
      margin-top: 10px;
      font-size: 15px;
      color: #AAAAAA;
      line-height: 1.5;
    }

    /* ── Reward card ── */
    .reward-card {
      margin-top: 32px;
      width: 100%;
      background: linear-gradient(135deg, #1A0000, #2A0000);
      border: 1px solid #CC0000;
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(204, 0, 0, 0.3);
      padding: 22px 20px;
      animation: fadeInUp 0.7s ease 0.4s both;
    }

    .reward-card .label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #CC0000;
    }

    .reward-card .desc {
      margin-top: 10px;
      font-size: 14px;
      color: #FFFFFF;
      line-height: 1.6;
    }

    .reward-steps {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 16px;
    }

    .step-dot {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #CC0000;
      border: 2px solid #CC0000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .step-dot.empty {
      background: transparent;
      border-color: #3A0000;
      color: #3A0000;
    }

    .step-dot.prize {
      background: linear-gradient(135deg, #CC0000, #FF2222);
      box-shadow: 0 0 10px rgba(255, 34, 34, 0.5);
      font-size: 12px;
    }

    .reward-hint {
      margin-top: 12px;
      font-size: 12px;
      color: #AAAAAA;
    }

    /* ── CTA ── */
    .cta-section {
      margin-top: 36px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: fadeInUp 0.7s ease 0.5s both;
    }

    .btn-primary {
      display: block;
      width: 100%;
      padding: 16px;
      background: #CC0000;
      color: white;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      animation: pulse 3s ease-in-out infinite;
    }

    .btn-primary:hover {
      background: #FF2222;
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    /* ── Already have card ── */
    .have-card-section {
      margin-top: 8px;
      text-align: center;
      animation: fadeInUp 0.7s ease 0.6s both;
    }

    .have-card-toggle {
      background: none;
      border: none;
      color: #AAAAAA;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color 0.2s;
    }

    .have-card-toggle:hover {
      color: #CC0000;
    }

    /* ── Email recovery form ── */
    .recovery-form {
      display: none;
      margin-top: 16px;
      width: 100%;
      background: #1A1A1A;
      border: 1px solid #2A2A2A;
      border-radius: 12px;
      padding: 20px;
      animation: fadeInUp 0.4s ease both;
    }

    .recovery-form.visible {
      display: block;
    }

    .recovery-form label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #AAAAAA;
      margin-bottom: 8px;
    }

    .recovery-form input {
      width: 100%;
      padding: 12px 14px;
      background: #0A0A0A;
      border: 1px solid #2A2A2A;
      border-radius: 8px;
      color: #FFFFFF;
      font-family: inherit;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .recovery-form input:focus {
      border-color: #CC0000;
    }

    .btn-secondary {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 13px;
      background: transparent;
      color: #CC0000;
      border: 1px solid #CC0000;
      border-radius: 8px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn-secondary:hover {
      background: #CC0000;
      color: white;
    }

    .recovery-msg {
      margin-top: 10px;
      font-size: 13px;
      text-align: center;
      min-height: 20px;
    }

    .recovery-msg.error { color: #FF2222; }
    .recovery-msg.success { color: #4CAF50; }

    /* ── Footer ── */
    .footer {
      margin-top: auto;
      padding-top: 40px;
      text-align: center;
      font-size: 11px;
      color: #333333;
      animation: fadeIn 0.7s ease 0.8s both;
    }

    /* ── Decorative top bar ── */
    .top-bar {
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #CC0000, #FF2222, #CC0000, transparent);
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
    }
  </style>
</head>
<body>

<div class="top-bar"></div>

<div class="page">

  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo-svg-wrap">
      <div class="logo-glow"></div>
      <svg width="110" height="110" viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Outer ring -->
        <circle cx="55" cy="55" r="52" fill="#1A0000" stroke="#CC0000" stroke-width="2"/>
        <!-- Inner glow circle -->
        <circle cx="55" cy="55" r="44" fill="#220000"/>
        <!-- Chef hat -->
        <g transform="translate(27, 14)">
          <!-- Hat base band -->
          <rect x="6" y="34" width="44" height="9" rx="2" fill="#CC0000"/>
          <!-- Hat body -->
          <path d="M12 34 C12 34 8 20 28 16 C48 12 48 34 48 34Z" fill="#FFFFFF"/>
          <!-- Hat puff top -->
          <ellipse cx="28" cy="18" rx="12" ry="9" fill="#FFFFFF"/>
          <!-- Hat center line -->
          <line x1="28" y1="25" x2="28" y2="34" stroke="#DDDDDD" stroke-width="1.5"/>
        </g>
        <!-- BABA FOOD text -->
        <text x="55" y="82" text-anchor="middle" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" letter-spacing="1">BABA FOOD</text>
      </svg>
    </div>
    <span class="logo-wordmark">Cucina Tunisina</span>
  </div>

  <!-- Hero -->
  <div class="hero">
    <h1>Benvenuto da<br/><span>BABA FOOD</span></h1>
    <p>Registrati e accumula punti fedeltà<br/>ad ogni visita che fai</p>
  </div>

  <!-- Reward info card -->
  <div class="reward-card">
    <div class="label">🎁 Programma Fedeltà</div>
    <div class="desc">Ogni visita conta. Alla <strong>10ª visita</strong> ti regaliamo un panino gratis!</div>
    <div class="reward-steps">
      <div class="step-dot">1</div>
      <div class="step-dot">2</div>
      <div class="step-dot">3</div>
      <div class="step-dot">4</div>
      <div class="step-dot">5</div>
      <div class="step-dot">6</div>
      <div class="step-dot">7</div>
      <div class="step-dot">8</div>
      <div class="step-dot">9</div>
      <div class="step-dot prize">🎁</div>
    </div>
    <div class="reward-hint">10 visite = 1 panino gratis 🥪</div>
  </div>

  <!-- CTA -->
  <div class="cta-section">
    <a href="register.html" class="btn-primary">Registrati ora</a>
  </div>

  <!-- Already have card -->
  <div class="have-card-section">
    <button class="have-card-toggle" id="toggleRecovery" type="button">
      Ho già una carta →
    </button>

    <div class="recovery-form" id="recoveryForm">
      <label for="recoveryEmail">La tua email</label>
      <input
        type="email"
        id="recoveryEmail"
        placeholder="nome@email.com"
        autocomplete="email"
      />
      <button class="btn-secondary" id="recoveryBtn" type="button">
        Trova la mia carta
      </button>
      <div class="recovery-msg" id="recoveryMsg"></div>
    </div>
  </div>

  <div class="footer">© 2025 BABA FOOD — Tutti i diritti riservati</div>

</div>

<script>
  const API_BASE = '';

  // Toggle recovery form
  document.getElementById('toggleRecovery').addEventListener('click', () => {
    const form = document.getElementById('recoveryForm');
    form.classList.toggle('visible');
    if (form.classList.contains('visible')) {
      document.getElementById('recoveryEmail').focus();
    }
  });

  // Recovery submit
  document.getElementById('recoveryBtn').addEventListener('click', async () => {
    const email = document.getElementById('recoveryEmail').value.trim();
    const msg = document.getElementById('recoveryMsg');
    const btn = document.getElementById('recoveryBtn');

    if (!email) {
      msg.textContent = 'Inserisci la tua email.';
      msg.className = 'recovery-msg error';
      return;
    }

    btn.textContent = 'Sto cercando…';
    btn.disabled = true;
    msg.textContent = '';

    try {
      const res = await fetch(`${API_BASE}/api/customer/by-email?email=${encodeURIComponent(email)}`);
      if (res.ok) {
        const data = await res.json();
        window.location.href = `card.html?token=${data.qr_token}`;
      } else if (res.status === 404) {
        msg.textContent = 'Email non trovata. Registrati per creare la tua carta!';
        msg.className = 'recovery-msg error';
      } else {
        msg.textContent = 'Errore. Riprova tra poco.';
        msg.className = 'recovery-msg error';
      }
    } catch (e) {
      msg.textContent = 'Connessione non disponibile. Riprova.';
      msg.className = 'recovery-msg error';
    } finally {
      btn.textContent = 'Trova la mia carta';
      btn.disabled = false;
    }
  });

  // Enter key on email input
  document.getElementById('recoveryEmail').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('recoveryBtn').click();
  });
</script>

</body>
</html>
